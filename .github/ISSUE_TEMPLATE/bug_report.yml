name: Bug report
description: Report a reproducible Tuned Image Sorter problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not attach private photos or unreviewed support bundles to public issues.
  - type: input
    id: version
    attributes:
      label: Version
      description: Example: v69.6 CPU portable
      placeholder: v69.6 CPU portable
    validations:
      required: true
  - type: dropdown
    id: profile
    attributes:
      label: Profile
      options:
        - CPU
        - GPU_FULL
        - GPU_LITE
        - Source tree
        - Not sure
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste non-private error text or summarize support-bundle findings.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not attach private photos or unreviewed logs.
          required: true
